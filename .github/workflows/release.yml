name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Get Version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Check if release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_EXISTS=$(gh release view "v${{ env.VERSION }}" --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ "$TAG_EXISTS" = "v${{ env.VERSION }}" ]; then
            echo "::notice::Release v${{ env.VERSION }} already exists — skipping."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        if: env.SKIP_RELEASE != 'true'
        run: npm ci

      - name: Run tests
        if: env.SKIP_RELEASE != 'true'
        run: npm test -- --no-coverage

      - name: Build
        if: env.SKIP_RELEASE != 'true'
        run: npm run build:prod

      - name: Extract Changelog
        if: env.SKIP_RELEASE != 'true'
        run: |
          if [ -f "CHANGELOG.md" ]; then
            # Extract version section from CHANGELOG
            awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | head -n -1 | tail -n +2 > release-notes.md
            if [ ! -s release-notes.md ]; then
              echo "Release of version v${VERSION}" > release-notes.md
            fi
          else
            echo "Release of version v${VERSION}" > release-notes.md
          fi

      - name: Create GitHub Release
        if: env.SKIP_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "KPMG Verifier PWA v${{ env.VERSION }}" \
            --notes-file release-notes.md \
            --target main \
            www/
