<!-- STATE: WAITING / VALIDATING / SUCCESS / ERROR -->

<!-- Waiting for Scan: Show fullscreen QR display -->
@if (isWaiting()) {
  <app-qr-display
    [qrData]="qrCodeUrl()"
    [duration]="120"
    [autoRegenerate]="true"
    (regenerate)="onQrRegenerate()"
  />
}

<!-- Validating: Show fullscreen validation popup -->
@if (isValidating()) {
  <app-validation-popup
    [isOpen]="true"
  />
}

<!-- Success: Show fullscreen welcome message -->
@if (isSuccess()) {
  <app-welcome-message
    [firstName]="userName()"
    [familyName]="''"
    [countdownDuration]="10"
    [autoRedirect]="true"
    (continueClicked)="onRetry()"
  />
}

<!-- Error: Show fullscreen error display -->
@if (isError()) {
  <div class="fullscreen-state error">
    <ion-icon name="close-circle" class="error-icon"></ion-icon>
    <h2>{{ 'verification.error.title' | translate }}</h2>
    <p class="error-message">{{ errorMessage() }}</p>
    
    @if (errorCode()) {
      <div class="error-details">
        <small>Código: {{ errorCode() }}</small>
      </div>
    }
    
    <ion-button expand="block" (click)="onRetry()">
      <ion-icon name="refresh" slot="start"></ion-icon>
      {{ 'verification.error.retry' | translate }}
    </ion-button>
    
    <ion-button expand="block" fill="outline" (click)="onGoHome()">
      <ion-icon name="home" slot="start"></ion-icon>
      {{ 'verification.error.go_home' | translate }}
    </ion-button>
  </div>
}
