<!-- STATE: WAITING / VALIDATING / PROGRESS / SUCCESS / ERROR -->

<!-- Modal overlays: always mounted to avoid flash on state transition -->
<app-validation-popup
  [isOpen]="currentState() === 'validating'"
/>

<app-validation-progress
  [isOpen]="progressModalOpen()"
  [validationResults]="validationResults()"
  (okClicked)="onProgressComplete()"
  (retryClicked)="onProgressRetry()"
/>

<app-credential-revoked
  [isOpen]="revokedModalOpen()"
  (tryAgainClicked)="onTryAgainFromRevoked()"
/>

@switch (currentState()) {
  <!-- Waiting for Scan: Show fullscreen QR display -->
  @case ('waiting') {
    <app-qr-display
      [qrData]="qrCodeUrl()"
      [duration]="120"
      [autoRegenerate]="true"
      (regenerate)="onQrRegenerate()"
      (copied)="onQrCopied()"
    />
  }

  <!-- Success: Show fullscreen welcome message -->
  @case ('success') {
    <app-welcome-message
      [firstName]="userFirstName()"
      [familyName]="userFamilyName()"
      [countdownDuration]="10"
      [autoRedirect]="true"
      (continueClicked)="onRetry()"
    />
  }

  <!-- Error: Show fullscreen error display -->
  @case ('error') {
    <div class="fullscreen-state error">
      <div class="error-card">
        <ion-icon name="close-circle" class="error-card__icon"></ion-icon>
        <h2 class="error-card__title">{{ 'verification.error.title' | translate }}</h2>
        <p class="error-card__message">{{ errorMessage() }}</p>

        @if (errorCode()) {
          <div class="error-card__details">
            <small>{{ 'verification.error.codeLabel' | translate }} {{ errorCode() }}</small>
          </div>
        }

        <div class="error-card__actions">
          <ion-button
            expand="block"
            shape="round"
            class="error-card__button"
            (click)="onRetry()">
            <ion-icon name="refresh" slot="start"></ion-icon>
            {{ 'verification.error.retry' | translate }}
          </ion-button>
        </div>
      </div>
    </div>
  }
}
