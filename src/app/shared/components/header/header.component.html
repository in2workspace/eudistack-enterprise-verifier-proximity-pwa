<ion-header class="app-header">
  <div class="header-container">
    @if (showLogo()) {
      <div class="header-logo">
        <img 
          [src]="logoUrl" 
          [alt]="effectiveTitle"
          class="logo-image"
        />
      </div>
    }    
    <h1 class="header-title">{{ effectiveTitle }}</h1>
  </div>
</ion-header>
