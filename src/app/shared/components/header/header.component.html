<ion-header class="app-header">
  <div class="header-container">
    @if (showLogo()) {
      <div class="header-logo" (click)="navigateHome()" style="cursor:pointer;">
        <img 
          [src]="logoUrl" 
          [alt]="title() || 'Logo'"
          class="logo-image"
        />
      </div>
    }    
  </div>
</ion-header>
