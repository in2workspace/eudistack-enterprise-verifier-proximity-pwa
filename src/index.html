<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>KPMG Validator</title>

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Default tenant favicon; ThemeService.setFavicon() overrides at runtime -->
  <link rel="icon" type="image/png" href="assets/tenant/favicon.png" />
  <link rel="apple-touch-icon" href="assets/tenant/favicon.png">
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#001E8C" />

  <!-- add to homescreen for ios -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <!-- load environment variables -->
  <script src="assets/env.js"></script>
  <!-- capture PWA install prompt before Angular bootstraps (race condition fix) -->
  <script>
    window.__pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__pwaInstallPrompt = e;
    });
  </script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
